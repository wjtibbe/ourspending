<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>OurSpending</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #F3F6F1; --card: #FFFFFF; --ink: #182A20; --muted: #6B7A70; --line: #E0E8DD;
      --green: #1F6B4E; --green-deep: #14503A; --blue: #33608D; --ochre: #A6641C;
      --warn: #C97A1F; --danger: #B3372E;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-font-smoothing: antialiased; }
    #root { min-height: 100vh; }
    .auth-photo { width: 260px; max-width: 30vw; height: auto; border-radius: 18px; object-fit: cover; box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
    @media (max-width: 900px) { .auth-photo { display: none; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="i18n.js"></script>
  <script src="app.js"></script>
</body>
</html>
